<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>告白立新 - 匿名社群</title>
  <!-- 引用 CSS 文件 -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <!-- 标题区域 -->
    <header>
      <img src="告白立新LOGO.png" alt="Logo">
      <h1>告白立新</h1>
    </header>
  
    <!-- 统计数据 -->
    <div class="stats">
      <div class="stat-card">
        <p>563</p>
        <p>已批准</p>
      </div>
      <div class="stat-card">
        <p>563</p>
        <p>已发布</p>
      </div>
      <div class="stat-card">
        <p>6</p>
        <p>待审核</p>
      </div>
    </div>
  
    <!-- 输入区域 -->
    <div class="input-section">
      <textarea placeholder="输入内容..."></textarea>
      <div class="buttons">
        <button class="upload-button">📤 上传图片</button>
        <button class="submit-button">📩 匿名发送</button>
      </div>
    </div>
  </div>
